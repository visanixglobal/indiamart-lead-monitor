version: "3.9"

services:
  indiamart-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indiamart-lead-monitor
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
