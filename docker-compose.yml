version: "3.9"

services:
  indiamart-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indiamart-lead-monitor
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist database and logs outside the container
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount .env so cookie refresh takes effect without rebuild
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
